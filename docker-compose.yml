version: "3.8"

services:
  bitpanel:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - bitpanel_data:/data
    env_file: .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  bitpanel_data:
